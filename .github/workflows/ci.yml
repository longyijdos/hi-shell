name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install zsh for plugin syntax check
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Run checks
        run: ./scripts/check.sh
